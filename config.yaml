# Mechatronics Card Sorting System Configuration
# This is a sample configuration file. Copy and customize for your setup.

system:
  name: "Card Sorting System"
  version: "1.0.0"
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR

# Camera Configuration
camera:
  index: 0                    # Camera device ID (0 = default)
  resolution: [1920, 1080]    # [width, height] in pixels
  fps: 30                     # Frames per second
  exposure: -6                # Auto exposure if -1
  focus: -1                   # Auto focus if -1

# Computer Vision Settings
vision:
  # Detection parameters
  threshold: 127              # Binary threshold (0-255)
  min_card_area: 5000         # Minimum contour area in pixels
  max_card_area: 50000        # Maximum contour area in pixels
  blur_kernel: 5              # Gaussian blur kernel size
  
  # Classification
  model_path: "models/classifier.pkl"
  confidence_threshold: 0.85  # Minimum confidence to accept (0.0-1.0)
  
  # Debug
  show_detection: false       # Show detection visualization
  save_images: false          # Save detected card images

# PLC Configuration
plc:
  type: "modbus"              # Options: modbus, snap7, pycomm3
  ip: "192.168.0.10"
  port: 502                   # Modbus: 502, S7: 102
  timeout: 3.0                # Connection timeout in seconds
  
  # For Siemens S7 (when type is "snap7")
  rack: 0
  slot: 1
  
  # For Allen-Bradley (when type is "pycomm3")
  micro800: false             # Set true for Micro800 series
  
  # Polling
  poll_interval: 0.05         # PLC polling interval in seconds

# Motion Control Configuration
motion:
  # Calibration (steps per millimeter)
  steps_per_mm_x: 800
  steps_per_mm_y: 800
  steps_per_mm_z: 1600
  
  # Speed and acceleration
  max_speed: 200              # Maximum speed in mm/s
  acceleration: 500           # Acceleration in mm/s²
  jog_speed: 50               # Manual jog speed in mm/s
  
  # Direction inversion (if motor moves wrong way)
  invert_x: false
  invert_y: false
  invert_z: false
  
  # Soft limits (millimeters)
  x_min: 0
  x_max: 950
  y_min: 0
  y_max: 550
  z_min: 0
  z_max: 150
  
  # Homing
  homing_speed: 50            # Speed during homing in mm/s
  homing_backoff: 5           # Distance to back off after hitting limit (mm)
  home_before_sort: true      # Home before each sorting session

# Position Definitions (all in millimeters)
positions:
  # Home position (usually at limits)
  home: [0, 0, 150]
  
  # Card pickup position
  pickup: [100, 100, 50]
  
  # Sorting destinations (suit-based sorting)
  sort_positions:
    hearts: [200, 300, 100]
    diamonds: [400, 300, 100]
    clubs: [600, 300, 100]
    spades: [800, 300, 100]
    discard: [500, 500, 100]  # For unrecognized cards

# Gripper Configuration
gripper:
  # PLC addresses
  gripper_coil: 2000          # Coil address for gripper solenoid
  
  # Heights
  pickup_height: -2           # mm below card surface (slight compression)
  release_height: 50          # mm above drop position
  approach_height: 100        # Safe height for moving between positions
  
  # Timing
  grip_delay: 0.3             # Seconds to wait after gripping
  release_delay: 0.2          # Seconds to wait after releasing
  
  # Air pressure (for reference - set mechanically)
  target_pressure: 4.5        # bar

# Sorting Configuration
sorting:
  mode: "suit"                # Options: suit, rank, custom
  
  # Custom sorting rules (when mode is "custom")
  custom_rules:
    - condition: "rank == 'A'"
      destination: "sort_positions.hearts"
    - condition: "suit in ['hearts', 'diamonds']"
      destination: "sort_positions.diamonds"
    - condition: "rank in ['J', 'Q', 'K']"
      destination: "sort_positions.clubs"
    - condition: "default"
      destination: "sort_positions.spades"
  
  # Error handling
  low_confidence_action: "discard"  # Options: discard, skip, manual
  max_retries: 3                     # Retry attempts for failed picks

# Performance Settings
performance:
  cycle_optimization: true    # Optimize motion paths
  parallel_processing: false  # Process next card while moving (experimental)
  target_cpm: 60              # Target cards per minute

# Safety
safety:
  emergency_stop_input: 7     # PLC input for E-stop (I0.7)
  enable_soft_limits: true
  collision_detection: true
  max_current_threshold: 2.5  # Amps - trigger collision if exceeded

# Logging
logging:
  enabled: true
  log_directory: "logs"
  log_rotation: "daily"       # Options: daily, weekly, size
  max_log_size: 10            # MB (when rotation is "size")
  keep_logs: 30               # Days to keep old logs
  
  # What to log
  log_positions: true
  log_classifications: true
  log_errors: true
  log_timing: false           # Detailed timing info (verbose)

# Statistics
statistics:
  enabled: true
  save_interval: 60           # Save stats every N seconds
  stats_file: "stats/sorting_stats.json"

# Debug Options
debug:
  enabled: false
  save_debug_images: false
  debug_image_path: "debug/images"
  verbose_motion: false
  simulate_hardware: false    # Test without real hardware
