version: '3.8'

# Automated Card Sorting System - Docker Services
# Authors: Josh Craven, Jae Park
# Course: TPJ653NAA

services:
  # Node-RED - Dashboard and Communication Bridge
  nodered:
    image: nodered/node-red:latest
    container_name: card-sorter-nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - nodered-data:/data
      - ./software/node-red/flows.json:/data/flows.json
    environment:
      - TZ=America/Toronto
    networks:
      - card-sorter-net
    depends_on:
      - mosquitto

  # Mosquitto MQTT Broker - Vision System Communication
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: card-sorter-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
      - ./software/docker/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - card-sorter-net

volumes:
  nodered-data:
    driver: local
  mosquitto-data:
    driver: local
  mosquitto-logs:
    driver: local

networks:
  card-sorter-net:
    driver: bridge
