# Mosquitto MQTT Broker Configuration
# Automated Card Sorting System

# General Settings
persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Network Settings
listener 1883
protocol mqtt

# WebSockets (for browser-based clients)
listener 9001
protocol websockets

# Anonymous access allowed (for local development)
# For production, configure authentication:
# password_file /mosquitto/config/passwd
# allow_anonymous false
allow_anonymous true

# Message Settings
max_queued_messages 1000
message_size_limit 0

# Logging
log_type error
log_type warning
log_type notice
log_type information

# Retained messages
retain_available true

# QoS Settings
max_qos 2
