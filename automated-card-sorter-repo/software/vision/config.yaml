# Configuration for Automated Card Sorting System - Vision Module
# Authors: Josh Craven, Jae Park
# Course: TPJ653NAA

# Camera Settings
camera:
  index: 0                    # USB camera device index (0 = default)
  width: 1920                 # Resolution width
  height: 1080                # Resolution height
  fps: 30                     # Frames per second
  
# MQTT Communication Settings
mqtt:
  broker: "localhost"         # MQTT broker address
  port: 1883                  # MQTT broker port
  topic_request: "vision/request"   # Topic to receive scan requests
  topic_result: "vision/result"     # Topic to publish results
  qos: 1                      # Quality of Service (0, 1, or 2)
  
# Classification Parameters
classification:
  confidence_threshold: 0.75  # Minimum confidence to accept classification
  flip_index: 77              # Special index value requesting card flip
  scan_request_index: 999     # Special index value triggering classification
  
# Template Directories
templates:
  ranks_dir: "templates/ranks/"   # Directory containing rank templates
  suits_dir: "templates/suits/"   # Directory containing suit templates
  
# Image Processing
preprocessing:
  gaussian_blur_kernel: 5     # Kernel size for Gaussian blur (odd number)
  adaptive_threshold_block: 11  # Block size for adaptive threshold
  adaptive_threshold_c: 2     # Constant subtracted from mean
  
# Region of Interest (ROI) Parameters
roi:
  rank:
    x_start: 0.05             # Start position (% of image width)
    x_end: 0.25               # End position (% of image width)
    y_start: 0.05             # Start position (% of image height)
    y_end: 0.25               # End position (% of image height)
  suit:
    x_start: 0.05
    x_end: 0.25
    y_start: 0.25
    y_end: 0.45
    
# Bin Mapping
# Maps card classifications to physical bin indices (0-21)
bins:
  rank_mode:
    A: 0
    "2": 1
    "3": 2
    "4": 3
    "5": 4
    "6": 5
    "7": 6
    "8": 7
    "9": 8
    "10": 9
    J: 10
    Q: 11
    K: 12
    
  suit_mode:
    "♠": 0    # Spades
    "♥": 1    # Hearts
    "♦": 2    # Diamonds
    "♣": 3    # Clubs
    
# Special Bin Indices (Do not modify)
special_bins:
  flipper_dropoff: 22         # Where card is dropped for flipping
  flipper_deadzone: 23        # Reserved, no motion
  flipper_pickup: 24          # Where flipped card is retrieved
  
# Logging
logging:
  enabled: true
  path: "logs/classifications.log"
  level: "INFO"               # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(levelname)s - %(message)s"
  max_file_size_mb: 10        # Rotate log file at this size
  backup_count: 5             # Number of backup files to keep
  
# Performance Tuning
performance:
  template_scales: [0.8, 1.0, 1.2]  # Scale factors for template matching
  max_processing_time_ms: 1000      # Maximum time per classification
  enable_gpu: false                  # Use GPU acceleration if available
  
# Debug Options
debug:
  save_captured_frames: false       # Save captured frames to disk
  save_preprocessed: false          # Save preprocessed images
  show_live_feed: false             # Display camera feed (requires display)
  verbose_mqtt: false               # Log all MQTT messages
